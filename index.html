<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>לוח הרגלים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  -webkit-box-sizing: border-box; box-sizing: border-box;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  font: inherit;
}
html {
  background: #0e0e10;
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}
body {
  font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0e0e10;
  color: #ffffff;
  min-height: 100vh;
  padding: 20px 14px 120px;
  overflow-x: hidden;
}
button { background: none; border: none; cursor: pointer; padding: 0; }
input  { background: none; border: none; outline: none; padding: 0; }

/* ── Topbar ── */
.topbar {
max-width: 680px;
margin: 0 auto 18px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: space-between; justify-content: space-between;
}
h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff; }
.undo-redo { display: -webkit-flex; display: flex; gap: 8px; }
.ur-btn {
background: #1c1c1e;
border-radius: 50%;
color: #8e8e93;
font-size: 17px;
width: 36px; height: 36px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
-webkit-transition: background .15s, color .15s; transition: background .15s, color .15s;
}
.ur-btn:disabled { opacity: 0.25; }

/* ── Legend row ── */
.legends {
max-width: 680px;
margin: 0 auto 18px;
display: -webkit-flex; display: flex;
-webkit-flex-direction: column; flex-direction: column;
gap: 8px;
}
.legends-row {
display: -webkit-flex; display: flex;
-webkit-flex-direction: row; flex-direction: row;
-webkit-align-items: stretch; align-items: stretch;
}
.col-legend {
display: -webkit-flex; display: flex;
-webkit-flex: 1; flex: 1;
gap: 8px;
}
.col-legend-item {
-webkit-flex: 1; flex: 1;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
gap: 6px;
padding: 7px 10px;
border-radius: 100px;
font-size: 12px; font-weight: 700;
cursor: pointer;
}
.col-legend-item.regular { background: #1a3d28; color: #5ebd7e; }
.col-legend-item.current { background: #3d2a0e; color: #d4955a; }
.col-legend-item.future  { background: #222224; color: #8e8e93; }
.col-legend-item.active-focus { outline: 2px solid currentColor; }
.col-legend-item.dimmed { opacity: 0.3; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; -webkit-flex-shrink: 0; flex-shrink: 0; }
.regular .legend-dot { background: #5ebd7e; }
.current .legend-dot { background: #d4955a; }
.future  .legend-dot { background: #8e8e93; }

.col-legend-header {
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
font-size: 11px; font-weight: 700;
color: #636366;
-webkit-flex-shrink: 0; flex-shrink: 0;
cursor: pointer;
}
.col-legend-header.edit-active { color: #ffffff; }

/* ── Wrapper ── */
.wrapper { max-width: 680px; margin: 0 auto; }

/* ── Category wrapper ── */
.cat-wrapper {
display: -webkit-flex; display: flex;
-webkit-flex-direction: row; flex-direction: row;
-webkit-align-items: stretch; align-items: stretch;
margin-bottom: 6px;
border-radius: 18px;
overflow: hidden;
}
.cat-tab {
display: -webkit-flex; display: flex;
-webkit-flex-direction: column; flex-direction: column;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
background: #2c2c2e;
min-width: 44px;
-webkit-flex-shrink: 0; flex-shrink: 0;
cursor: pointer;
padding: 10px 8px;
gap: 4px;
}
.cat-tab-label {
display: block;
font-size: 11px; font-weight: 700;
color: #aeaeb2;
text-align: center;
line-height: 1.3;
}
.cat-tab-count {
font-size: 12px; font-weight: 700;
color: #636366;
}

/* ── Category card ── */
.category-card {
background: #1c1c1e;
-webkit-flex: 1; flex: 1;
min-width: 0;
overflow: hidden;
}

/* ── 3-col grid ── */
.cat-cols {
display: -webkit-flex; display: flex;
width: 100%;
}
.col {
-webkit-flex: 1; flex: 1;
padding: 8px 7px 5px;
border-left: 1px solid rgba(255,255,255,0.07);
min-height: 40px;
position: relative;
min-width: 0;
overflow: hidden;
}
.col:last-child { border-left: none; }
.col.drag-over { background: rgba(255,255,255,0.04); }

/* ── Chip ── */
.chip {
display: block;
padding: 6px 8px;
border-radius: 11px;
font-size: 11.5px; font-weight: 500; line-height: 1.35;
margin-bottom: 5px;
word-break: break-word;
cursor: default;
position: relative;
text-align: center;
width: 100%;
-webkit-box-sizing: border-box; box-sizing: border-box;
}
.col.regular .chip { background: #1a3d28; color: #5ebd7e; }
.col.current .chip { background: #3d2a0e; color: #d4955a; }
.col.future  .chip { background: #222224; color: #8e8e93; }

.chip.dragging { opacity: 0.2; -webkit-transform: scale(0.94); transform: scale(0.94); }
.chip-text { display: block; text-align: center; }

/* ── Undo toast ── */
#undo-toast {
position: fixed;
bottom: 28px; left: 50%;
-webkit-transform: translateX(-50%) translateY(80px);
transform: translateX(-50%) translateY(80px);
background: #2c2c2e;
border: 1px solid rgba(255,255,255,0.1);
border-radius: 16px;
padding: 10px 8px 10px 16px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
gap: 10px;
font-family: 'Heebo', sans-serif;
font-size: 13px; font-weight: 500;
color: #e0e0e0;
white-space: nowrap;
-webkit-box-shadow: 0 8px 32px rgba(0,0,0,0.6); box-shadow: 0 8px 32px rgba(0,0,0,0.6);
z-index: 20000;
-webkit-transition: -webkit-transform 0.28s, opacity 0.28s;
transition: transform 0.28s, opacity 0.28s;
opacity: 0;
pointer-events: none;
}
#undo-toast.show {
-webkit-transform: translateX(-50%) translateY(0);
transform: translateX(-50%) translateY(0);
opacity: 1;
pointer-events: all;
}
#undo-toast .toast-undo-btn {
background: rgba(255,255,255,0.1);
border-radius: 10px;
color: #fff;
font-family: 'Heebo', sans-serif;
font-size: 13px; font-weight: 700;
padding: 5px 12px;
cursor: pointer;
-webkit-flex-shrink: 0; flex-shrink: 0;
}
</style>
</head>

<body>

<div class="topbar">
  <h1>הרגלים O v6</h1>
  <div class="undo-redo">
    <button class="ur-btn" id="undoBtn" onclick="undo()" disabled>↺</button>
    <button class="ur-btn" id="redoBtn" onclick="redo()" disabled>↻</button>
  </div>
</div>

<div class="legends">
  <div class="legends-row">
    <div class="col-legend-header">קטגוריה</div>
    <div class="col-legend">
      <div class="col-legend-item regular"><div class="legend-dot"></div>ברגיל</div>
      <div class="col-legend-item current"><div class="legend-dot"></div>בתהליך</div>
      <div class="col-legend-item future"><div class="legend-dot"></div>לשפר בעתיד</div>
    </div>
  </div>
</div>

<div class="wrapper">
  <div id="board"></div>

  <div class="add-cat-bar">
    <input class="add-cat-inp" id="newCatInput" placeholder="+ קטגוריה חדשה..." />
    <button class="add-cat-btn" onclick="addCategory()">הוסף</button>
  </div>
</div>

<div id="undo-toast">
  <span id="toast-msg">בוצע</span>
  <button class="toast-undo-btn" onclick="toastUndo()">ביטול</button>
</div>

<div id="drag-ghost"></div>

<script>

let data = []
let history = []
let histIdx = -1

function persist(){
localStorage.setItem("hb8",JSON.stringify(data))
}

function snapshot(){
history = history.slice(0,histIdx+1)
history.push(JSON.parse(JSON.stringify(data)))
histIdx = history.length-1
}

function undo(){
if(histIdx<=0)return
histIdx--
data = JSON.parse(JSON.stringify(history[histIdx]))
persist()
render()
}

function redo(){
if(histIdx>=history.length-1)return
histIdx++
data = JSON.parse(JSON.stringify(history[histIdx]))
persist()
render()
}

function commit(msg){
persist()
snapshot()
render()
showToast(msg)
}

function showToast(msg){
const t = document.getElementById("undo-toast")
document.getElementById("toast-msg").textContent = msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),3000)
}

function addCategory(){
const inp = document.getElementById("newCatInput")
const name = inp.value.trim()
if(!name)return
data.push({name,cols:[[],[],[]]})
inp.value=""
commit("קטגוריה נוספה")
}

function render(){

const board = document.getElementById("board")
board.innerHTML=""

data.forEach((cat,ci)=>{

const wrapper = document.createElement("div")
wrapper.className="cat-wrapper"

const tab = document.createElement("div")
tab.className="cat-tab"

const label = document.createElement("span")
label.className="cat-tab-label"
label.textContent=cat.name

tab.appendChild(label)

const card = document.createElement("div")
card.className="category-card"

const cols = document.createElement("div")
cols.className="cat-cols"

cat.cols.forEach((col,ki)=>{

const colEl = document.createElement("div")
colEl.className="col"

col.forEach((item)=>{

const chip = document.createElement("div")
chip.className="chip"

const txt = document.createElement("span")
txt.className="chip-text"
txt.textContent=item

chip.appendChild(txt)
colEl.appendChild(chip)

})

cols.appendChild(colEl)

})

card.appendChild(cols)
wrapper.appendChild(tab)
wrapper.appendChild(card)
board.appendChild(wrapper)

})

}

snapshot()
render()

</script>
</body>
</html>
