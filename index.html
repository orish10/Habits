<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>לוח הרגלים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  margin: 0; padding: 0;
  -webkit-box-sizing: border-box; box-sizing: border-box;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  font: inherit;
}
html {
  background: #0e0e10;
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}
body {
  font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0e0e10;
  color: #ffffff;
  min-height: 100vh;
  padding: 20px 14px 120px;
  overflow-x: hidden;
}
button { background: none; border: none; cursor: pointer; padding: 0; }
input  { background: none; border: none; outline: none; padding: 0; }

/* ── Topbar ── */
.topbar {
max-width: 680px;
margin: 0 auto 18px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: space-between; justify-content: space-between;
}
h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff; }
.undo-redo {
display: -webkit-flex; display: flex;
gap: 8px;
position: absolute;
left: 50%;
-webkit-transform: translateX(-50%); transform: translateX(-50%);
}
.topbar { position: relative; }
.ur-btn {
background: #1c1c1e;
border-radius: 50%;
color: #8e8e93;
font-size: 17px;
width: 36px; height: 36px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
-webkit-transition: background .15s, color .15s; transition: background .15s, color .15s;
}
.ur-btn:disabled { opacity: 0.25; }

/* ── Legend row ── */
.legends {
max-width: 680px;
margin: 0 auto 18px;
display: -webkit-flex; display: flex;
-webkit-flex-direction: column; flex-direction: column;
gap: 8px;
}
.legends-row {
display: -webkit-flex; display: flex;
-webkit-flex-direction: row; flex-direction: row;
-webkit-align-items: stretch; align-items: stretch;
}
.col-legend {
display: -webkit-flex; display: flex;
-webkit-flex: 1; flex: 1;
-webkit-align-items: stretch; align-items: stretch;
}
.col-legend-item {
-webkit-flex: 1; flex: 1;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
gap: 6px;
padding: 7px 4px;
border-radius: 0;
font-size: 12px; font-weight: 700;
cursor: pointer;
}
.col-legend-header {
display: -webkit-flex; display: flex;
-webkit-flex: 1; flex: 1;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;
font-size: 11px; font-weight: 700;
color: #636366;
cursor: pointer;
padding: 7px 4px;
}
.col-legend-header.edit-active { color: #ffffff; }
.col-legend-item.regular { background: #1a3d28; color: #5ebd7e; border-radius: 100px; margin: 3px 2px; }
.col-legend-item.current { background: #3d2a0e; color: #d4955a; border-radius: 100px; margin: 3px 2px; }
.col-legend-item.future  { background: #222224; color: #8e8e93; border-radius: 100px; margin: 3px 2px; }
.col-legend-item.active-focus { outline: 2px solid currentColor; }
.col-legend-item.dimmed { opacity: 0.3; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; -webkit-flex-shrink: 0; flex-shrink: 0; }
.regular .legend-dot { background: #5ebd7e; }
.current .legend-dot { background: #d4955a; }
.future  .legend-dot { background: #8e8e93; }

/* ── Wrapper ── */
.wrapper { max-width: 680px; margin: 0 auto; }

/* ── Category wrapper ── */
.cat-wrapper {
display: -webkit-flex; display: flex;
-webkit-flex-direction: row; flex-direction: row;
-webkit-align-items: stretch; align-items: stretch;
margin-bottom: 6px;
border-radius: 18px;
overflow: hidden;
}
.cat-tab {
display: -webkit-flex; display: flex;
-webkit-flex-direction: column; flex-direction: column;

-webkit-justify-content: center; justify-content: center;
background: #2c2c2e;
-webkit-flex: 1; flex: 1;
-webkit-flex-shrink: 0; flex-shrink: 0;

}
.cat-tab-label {

color: #636366;
text-align: center;
line-height: 1.3;

}
body.cat-edit-mode .cat-tab-label { display: none; }

.cat-tab-count {

color: #636366;
}
.cat-edit-actions {

-webkit-flex-direction: column; flex-direction: column;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: center; justify-content: center;

padding: 6px 0;
}

body.cat-edit-mode .cat-edit-actions { display: -webkit-flex; display: flex; }
body.cat-edit-mode .chip,
body.cat-edit-mode .add-row,
body.cat-edit-mode .add-cat-bar { pointer-events: none; opacity: 0.35; }

.cat-edit-del {

border-radius: 50%;
border: 2px solid #48484a;

}
.cat-edit-del.cat-selected-check {

}
.cat-edit-del.cat-selected-check::after {

}

.cat-edit-overlay {
display: none;

background: rgba(0,0,0,0.3);

}

}
.cat-wrapper.cat-selected { outline: 2px solid rgba(255,59,48,0.5); }
.cat-wrapper.cat-selected .cat-tab { background: rgba(255,59,48,0.22) !important; }
.cat-wrapper.cat-selected .category-card { background: rgba(255,59,48,0.15) !important; }

#cat-delete-bar {

bottom: 0; left: 0; right: 0;

color: #ff3b30;

/* ── Category card ── */
.category-card {
background: #1c1c1e;

min-width: 0;

}

/* ── 3-col grid ── */

}
.col {

}

/* ── Chip ── */

}

.add-done-btn {

color: #8e8e93;

border-radius: 14px;

}

</head>
<body>

<div class="topbar">
  <h1>הרגלים v59</h1>
  <div class="undo-redo">
    <button class="ur-btn" id="undoBtn" onclick="undo()" title="אחורה (Ctrl+Z)" disabled>↺</button>
    <button class="ur-btn" id="redoBtn" onclick="redo()" title="קדימה (Ctrl+Y)" disabled>↻</button>

  <div class="legends-row">
    <div class="col-legend">
      <div class="col-legend-header" id="catLegendHeader">קטגוריה</div>
      <div class="col-legend-item regular"><div class="legend-dot"></div>ברגיל</div>
      <div class="col-legend-item current"><div class="legend-dot"></div>בתהליך</div>
      <div class="col-legend-item future" ><div class="legend-dot"></div>לשפר בעתיד</div>
    </div>

<div class="wrapper">
  <div id="board"></div>
  <div class="add-cat-bar">
    <input class="add-cat-inp" id="newCatInput" placeholder="+ קטגוריה חדשה..." />
    <button class="add-cat-btn" onclick="addCategory()">הוסף</button>
  </div>
</div>

<div id="cat-delete-bar" onclick="bulkDeleteCats()">מחק קטגוריות נבחרות</div>

<div id="undo-toast">
  <span id="toast-msg">בוצע</span>
  <button class="toast-undo-btn" onclick="toastUndo()">ביטול</button>
</div>
<div id="drag-ghost"></div>
<div id="cat-drag-ghost"></div>

  <span id="bulk-count">0 נבחרו</span>

</div>

  <div class="bulk-btn bulk-move-sub" onclick="bulkMove(0)">● ברגיל</div>
  <div class="bulk-btn bulk-move-sub" onclick="bulkMove(1)">● בתהליך</div>
  <div class="bulk-btn bulk-move-sub" onclick="bulkMove(2)">● לשפר</div>
  <div class="bulk-btn" onclick="hideMoveRow()">ביטול</div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

const FLAG_CYCLE = [null, 'focus', 'urgent', 'pause'];
const FLAG_ICON  = {};

function mkItems(arr) { return arr.map(t => ({ t, f: null })); }
const DEFAULT = [];

let _keyCounter = 0;
function newKey() { return 'k' + (++_keyCounter); }

function migrate(d) {
  d.forEach(cat => {
    cat.cols = cat.cols.map(col =>
      col.map(item => {
        if (typeof item === 'string') item = { t: item, f: null };
        if (!item._key) item._key = newKey();
        return item;
      })
    );
  });
  return d;
}

const MAX_HIST = 80;
let history = [], histIdx = -1;

function snapshot() {
  history = history.slice(0, histIdx + 1);
  history.push(JSON.parse(JSON.stringify(data)));
  if (history.length > MAX_HIST) history.shift();
  histIdx = history.length - 1;
  updateUR();
}
function undo() {
  if (histIdx <= 0) return;
  histIdx--;
  data = JSON.parse(JSON.stringify(history[histIdx]));
  persist(); render(); updateUR();
}
function redo() {
  if (histIdx >= history.length - 1) return;
  const next = history[histIdx + 1];
  const curr = history[histIdx];
  const nextCount = next.reduce((s, c) => s + c.cols.reduce((a, col) => a + col.length, 0), 0);
  const currCount = curr.reduce((s, c) => s + c.cols.reduce((a, col) => a + col.length, 0), 0);
  if (nextCount < currCount) {
    showRedoDeleteConfirm(() => { histIdx++; data = JSON.parse(JSON.stringify(history[histIdx])); persist(); render(); updateUR(); });
  } else {
    histIdx++;
    data = JSON.parse(JSON.stringify(history[histIdx]));
    persist(); render(); updateUR();
  }
}
function updateUR() {
  document.getElementById('undoBtn').disabled = histIdx <= 0;
  document.getElementById('redoBtn').disabled = histIdx >= history.length - 1;
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.key==='z'&&e.shiftKey))) { e.preventDefault(); redo(); }
});

function persist() {
  try {
    const json = JSON.stringify(data);
    localStorage.setItem('hb8', json);
    localStorage.setItem('hb8_ts', Date.now());
  } catch(e) { console.warn('persist failed', e); }
}
function load() {
  try {
    const raw = localStorage.getItem('hb8');
    if (raw) {
      const parsed = JSON.parse(raw);
      console.log('loaded from localStorage, categories:', parsed.length);
      return parsed;
    }
  } catch(e) { console.warn('load failed', e); }
  console.log('no saved data');
  return null;
}
window.addEventListener('pagehide', () => { try { localStorage.setItem('hb8', JSON.stringify(data)); } catch(e) {} });
window.addEventListener('beforeunload', () => { try { localStorage.setItem('hb8', JSON.stringify(data)); } catch(e) {} });

let raw = load();
let data = raw ? migrate(raw) : JSON.parse(JSON.stringify(DEFAULT));
history = [JSON.parse(JSON.stringify(data))];
histIdx = 0; updateUR();

function compact(d) {
  d.forEach(cat => {
    cat.cols = cat.cols.map(col => col.filter(item => item && item.t && item.t.trim()));
  });
}

function toggleCollapse(ci) {
  data[ci].collapsed = !data[ci].collapsed;
  persist(); render();
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('undo-toast');
  document.getElementById('toast-msg').textContent = msg;
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}
function toastUndo() {
  document.getElementById('undo-toast').classList.remove('show');
  clearTimeout(toastTimer);
  undo();
}
function commit(msg) {
  compact(data); persist(); snapshot(); render();
  showToast(msg || 'בוצע');
}

let activePicker = null;

function handlePickerAction(opt, ci, ki, ii, isFocused, isPaused, habitText) {
  if (opt.flag === 'delete') {
    const _ci = ci, _ki = ki, _ii = ii;
    closeFlagPicker();
    setTimeout(() => {
      showDeleteConfirm(habitText, () => {
        data[_ci].cols[_ki].splice(_ii, 1);
        commit('הרגל נמחק');
      });
    }, 50);
  } else if (opt.flag === 'pause') {
    data[ci].cols[ki][ii].f = 'pause';
    commit('הרגל הושהה'); closeFlagPicker();
  } else if (opt.flag === 'unpause') {
    data[ci].cols[ki][ii].f = null;
    commit('הרגל חודש'); closeFlagPicker();
  } else if (opt.flag === 'focus') {
    data[ci].cols[ki][ii].f = 'focus';
    commit('סומן כמודגש'); closeFlagPicker();
  } else if (opt.flag === 'unfocus') {
    data[ci].cols[ki][ii].f = null;
    commit('הדגשה הוסרה'); closeFlagPicker();
  } else {
    data[ci].cols[ki][ii].f = opt.flag;
    commit('בוצע'); closeFlagPicker();
  }
}

function openFlagPicker(chip, ci, ki, ii, currentFlag, habitText) {
  closeFlagPicker();
  const picker = document.createElement('div');
  picker.className = 'flag-picker';
  picker.id = 'flagPicker';
  const isFocused = currentFlag === 'focus' || currentFlag === 'focus-pause';
  const isPaused  = currentFlag === 'pause'  || currentFlag === 'focus-pause';
  const options = [
    isFocused
      ? { flag: 'unfocus', icon: '✕', label: 'הסר הדגשה', skip: false }
      : { flag: 'focus',   icon: '*', label: 'מודגש', cls: 'fp-focus', skip: false },
    isPaused
      ? { flag: 'unpause', icon: '▶', label: 'המשך', skip: false }
      : { flag: 'pause',   icon: '⏸', label: 'מושהה', skip: false },
    { flag: 'delete', icon: '⊗', label: 'מחק', skip: false, danger: true },
  ];
  options.filter(opt => !opt.skip).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'fp-btn' + (opt.danger ? ' fp-danger' : '') + (opt.cls ? ' ' + opt.cls : '');
    btn.innerHTML = `<span class="fp-icon">${opt.icon}</span><span class="fp-label">${opt.label}</span>`;
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => { handlePickerAction(opt, ci, ki, ii, isFocused, isPaused, habitText); });
    btn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); handlePickerAction(opt, ci, ki, ii, isFocused, isPaused, habitText); });
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  activePicker = picker;
  activePicker._chip = chip;
  const rect = chip.getBoundingClientRect();
  const pw = picker.offsetWidth;
  const ph = picker.offsetHeight;
  let left = rect.left + rect.width / 2 - pw / 2;
  let top  = rect.bottom + 4;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  if (rect.bottom + 4 + ph > window.innerHeight) top = rect.top - ph - 4;
  picker.style.top  = top + 'px';
  picker.style.left = left + 'px';
  _confirmPickerPos = { top, chipCx: rect.left + rect.width / 2 };
}

function openChipEdit(chip, ci, ki, ii) {
  const text = data[ci].cols[ki][ii].t;
  chip.classList.add('editing');
  chip.innerHTML = '';
  const inp = document.createElement('textarea');
  inp.className = 'chip-input';
  inp.value = text;
  inp.rows = 1;
  chip.appendChild(inp);
  inp.style.webkitUserSelect = 'text';
  inp.style.userSelect = 'text';
  inp.focus(); inp.select();
  const finish = () => {
    const val = inp.value.trim();
    if (!val) { data[ci].cols[ki].splice(ii, 1); commit('הרגל נמחק'); }
    else      { data[ci].cols[ki][ii].t = val;   commit('הרגל עודכן'); }
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = text; inp.blur(); }
  });
}

function closeFlagPicker() {
  if (activePicker) { activePicker.remove(); activePicker = null; }
}
document.addEventListener('pointerdown', e => {
  if (activePicker && !activePicker.contains(e.target)) closeFlagPicker();
});

let drag = null, longPressTimer = null;
const LONG_MS = 480;
const ghost = document.getElementById('drag-ghost');

function startDrag(ci, ki, ii, el, text, x, y) {
  closeFlagPicker();
  drag = { ci, ki, ii, el };
  el.classList.add('dragging');
  ghost.textContent = text;
  ghost.style.display = 'block';
  moveGhost(x, y);
}
function moveGhost(x, y) {
  ghost.style.left = (x - ghost.offsetWidth / 2) + 'px';
  ghost.style.top  = (y - 50) + 'px';
}
function endDrag(tci, tki) {
  if (!drag) return;
  const { ci, ki, ii, el } = drag;
  el.classList.remove('dragging');
  ghost.style.display = 'none';
  clearDragOver();
  if (tci !== null && tci === ci && tki !== ki) {
    const draggedKey = data[ci].cols[ki][ii]?._key;
    const isDraggedSelected = draggedKey && selected.includes(draggedKey);
    if (selectMode && isDraggedSelected && selected.length > 1) {
      const resolved = selected.map(k => findItem(k)).filter(Boolean).filter(item => item.ci === ci);
      const sorted = resolved.sort((a,b) => b.ki-a.ki || b.ii-a.ii);
      sorted.forEach(({ci:c, ki:k, ii:i}) => {
        const item = data[c].cols[k].splice(i, 1)[0];
        data[c].cols[tki].push(item);
      });
      commit(resolved.length + ' הרגלים הועברו');
      document.getElementById('bulk-done').style.display = 'block';
    } else {
      const item = data[ci].cols[ki].splice(ii, 1)[0];
      data[ci].cols[tki].push(item);
      commit('הרגל הועבר');
    }
  }
  drag = null;
}
function cancelDrag() {
  if (!drag) return;
  drag.el.classList.remove('dragging');
  ghost.style.display = 'none';
  drag = null;
  clearDragOver();
}
function clearDragOver() {
  document.querySelectorAll('.col.drag-over').forEach(c => c.classList.remove('drag-over'));
}
document.addEventListener('mousemove', e => { if (drag) { moveGhost(e.clientX, e.clientY); clearDragOver(); const over = document.elementFromPoint(e.clientX, e.clientY)?.closest('.col'); if (over && parseInt(over.dataset.ci) === drag.ci) over.classList.add('drag-over'); } });
document.addEventListener('mouseup', () => { clearTimeout(longPressTimer); if (drag) cancelDrag(); });

let catEditMode = false;
let selectedCats = new Set();

const catLegendHeader = document.getElementById('catLegendHeader');
catLegendHeader.addEventListener('click', () => {
  catEditMode = !catEditMode;
  if (!catEditMode) selectedCats.clear();
  document.body.classList.toggle('cat-edit-mode', catEditMode);
  catLegendHeader.classList.toggle('edit-active', catEditMode);
  updateCatDeleteBar();
  render();
});

function updateCatDeleteBar() {
  const bar = document.getElementById('cat-delete-bar');
  if (!bar) return;
  if (selectedCats.size > 0) {
    bar.textContent = `מחק ${selectedCats.size} קטגוריות נבחרות`;
    bar.classList.remove('no-selection');
  } else {
    bar.textContent = 'מחק קטגוריות נבחרות';
    bar.classList.add('no-selection');
  }
}

function toggleCatSelect(ci) {
  if (selectedCats.has(ci)) selectedCats.delete(ci);
  else selectedCats.add(ci);
  updateCatDeleteBar();
  render();
}

function bulkDeleteCats() {
  if (selectedCats.size === 0) return;
  const sorted = Array.from(selectedCats).sort((a,b) => b - a);
  sorted.forEach(ci => data.splice(ci, 1));
  selectedCats.clear();
  commit(sorted.length + ' קטגוריות נמחקו');
  updateCatDeleteBar();
}

function openCatRename(ci, overlayEl) {
  const inp = document.createElement('input');
  inp.value = data[ci].name;
  inp.style.cssText = `background:none;border:none;outline:none;font-family:Heebo,sans-serif;font-size:14px;font-weight:700;color:#fff;text-align:center;width:90%;-webkit-user-select:text;user-select:text;border-bottom:1.5px solid rgba(255,255,255,0.4);`;
  overlayEl.textContent = '';
  overlayEl.appendChild(inp);
  inp.focus(); inp.select();
  const finish = () => {
    const v = inp.value.trim();
    if (v && v !== data[ci].name) { data[ci].name = v; commit('שם קטגוריה עודכן'); }
    else render();
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = data[ci].name; inp.blur(); } });
}

let catDrag = null;
const catGhost = document.getElementById('cat-drag-ghost');

const catInsertLine = document.createElement('div');
catInsertLine.style.cssText = `position:fixed; left:0; right:0; height:3px; background: rgba(255,255,255,0.7); border-radius:2px; z-index:9997; pointer-events:none; display:none; box-shadow: 0 0 8px rgba(255,255,255,0.4);`;
document.body.appendChild(catInsertLine);

function startCatDrag(ci, tabEl, startY) {
  const wrappers = Array.from(document.querySelectorAll('.cat-wrapper'));
  const el = wrappers[ci];
  const rect = el.getBoundingClientRect();
  const origRects = wrappers.map(w => w.getBoundingClientRect());
  el.style.cssText += `position:fixed; top:${rect.top}px; left:${rect.left}px; width:${rect.width}px; z-index:9999; box-shadow:0 12px 40px rgba(0,0,0,0.8); opacity:0.97; transition:none; pointer-events:none; margin:0;`;
  const placeholder = document.createElement('div');
  placeholder.style.cssText = `height:${rect.height}px; margin-bottom:6px; flex-shrink:0;`;
  el.parentNode.insertBefore(placeholder, el);
  catDrag = { ci, el, placeholder, origRects, startY, fixedTop: rect.top, insertIdx: ci };
  moveFloatingCat(startY);
}

function moveFloatingCat(y) {
  if (!catDrag) return;
  const { el, origRects, ci, startY, fixedTop } = catDrag;
  const newTop = fixedTop + (y - startY);
  el.style.top = newTop + 'px';
  const centerY = newTop + origRects[ci].height / 2;
  let insertIdx = ci;
  let found = false;
  const others = origRects.map((r, i) => i).filter(i => i !== ci);
  for (let j = 0; j < others.length; j++) {
    const i = others[j];
    const mid = origRects[i].top + origRects[i].height / 2;
    if (centerY <= mid) {
      insertIdx = i > ci ? i - 1 : i;
      found = true;
      break;
    }
  }
  if (!found) insertIdx = origRects.length - 1;
  insertIdx = Math.max(0, Math.min(data.length - 1, insertIdx));
  catDrag.insertIdx = insertIdx;
  const wrappers = Array.from(document.querySelectorAll('.cat-wrapper'));
  const dragH = origRects[ci].height + 6;
  wrappers.forEach((w, i) => {
    if (i === ci) return;
    let shift = 0;
    if (ci < insertIdx && i > ci && i <= insertIdx) shift = -dragH;
    if (ci > insertIdx && i >= insertIdx && i < ci) shift = dragH;
    w.style.transform = `translateY(${shift}px)`;
    w.style.transition = 'transform 0.18s ease';
  });
  if (insertIdx === ci) { catInsertLine.style.display = 'none'; return; }
  let lineY;
  if (insertIdx < ci) lineY = origRects[insertIdx].top;
  else lineY = origRects[insertIdx].bottom + 3;
  catInsertLine.style.display = 'block';
  catInsertLine.style.top = lineY + 'px';
}

function endCatDrag(y) {
  if (!catDrag) return;
  const { el, placeholder, ci, insertIdx } = catDrag;
  catInsertLine.style.display = 'none';
  el.style.cssText = '';
  placeholder.remove();
  document.querySelectorAll('.cat-wrapper').forEach(w => { w.style.transform = ''; w.style.transition = ''; });
  catDrag = null;
  if (insertIdx !== ci) {
    const [item] = data.splice(ci, 1);
    data.splice(insertIdx, 0, item);
    commit('קטגוריה הוזזה');
  } else {
    render();
  }
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  data.forEach((cat, ci) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'cat-wrapper';

    const tab = document.createElement('div');
    tab.className = 'cat-tab';
    tab.dataset.ci = ci;

    let tabPressTimer = null, tabDragging = false;
    tab.addEventListener('pointerdown', e => {
      if (catEditMode) return;
      tabDragging = false;
      tabPressTimer = setTimeout(() => { tabPressTimer = null; tabDragging = true; startCatDrag(ci, tab, e.clientY); }, 500);
    }, { passive: true });
    tab.addEventListener('touchmove', e => {
      if (!tabDragging) return;
      e.preventDefault();
      moveFloatingCat(e.touches[0].clientY);
    }, { passive: false });
    tab.addEventListener('touchend', e => {
      if (tabDragging) { endCatDrag(e.changedTouches[0].clientY); tabDragging = false; return; }
      if (tabPressTimer) { clearTimeout(tabPressTimer); tabPressTimer = null; toggleCollapse(ci); }
    });
    tab.addEventListener('touchcancel', () => {
      clearTimeout(tabPressTimer); tabPressTimer = null;
      if (tabDragging) { tabDragging = false; catDrag = null; document.querySelectorAll('.cat-wrapper').forEach(w => w.classList.remove('cat-dragging','cat-drag-above','cat-drag-below')); render(); }
    });
    tab.addEventListener('pointermove', e => {
      if (!tabDragging) { if (Math.abs(e.movementY) > 4) { clearTimeout(tabPressTimer); tabPressTimer = null; } return; }
      moveFloatingCat(e.clientY);
    });
    tab.addEventListener('pointerup', e => {
      if (tabDragging) { endCatDrag(e.clientY); tabDragging = false; return; }
      if (tabPressTimer) { clearTimeout(tabPressTimer); tabPressTimer = null; toggleCollapse(ci); }
    });
    tab.addEventListener('pointercancel', () => {
      clearTimeout(tabPressTimer); tabPressTimer = null;
      if (tabDragging) { tabDragging = false; catDrag = null; document.querySelectorAll('.cat-wrapper').forEach(w => w.classList.remove('cat-dragging','cat-drag-above','cat-drag-below')); render(); }
    });

    const tabLabel = document.createElement('span');
    tabLabel.className = 'cat-tab-label';
    tabLabel.textContent = cat.name.length > 8 ? cat.name.slice(0, 8) + '…' : cat.name;
    tab.appendChild(tabLabel);

    const tabCount = document.createElement('span');
    tabCount.className = 'cat-tab-count';
    if (focusCol !== null) {
      tabCount.textContent = (cat.cols[focusCol] || []).length;
      tabCount.style.color = ['#5ebd7e', '#d4955a', '#8e8e93'][focusCol];
    } else {
      tabCount.textContent = cat.cols.reduce((s, c) => s + c.length, 0);
    }
    tab.appendChild(tabCount);

    const editActions = document.createElement('div');
    editActions.className = 'cat-edit-actions';
    const delBtn = document.createElement('div');
    delBtn.className = 'cat-edit-del';
    delBtn.classList.toggle('cat-selected-check', selectedCats.has(ci));
    delBtn.addEventListener('pointerdown', e => e.stopPropagation());
    delBtn.addEventListener('click', e => { e.stopPropagation(); toggleCatSelect(ci); });
    delBtn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); toggleCatSelect(ci); });
    editActions.appendChild(delBtn);
    tab.appendChild(editActions);

    const card = document.createElement('div');
    card.className = 'category-card';

    const overlay = document.createElement('div');
    overlay.className = 'cat-edit-overlay';
    overlay.textContent = cat.name;
    overlay.addEventListener('dblclick', e => { e.stopPropagation(); openCatRename(ci, overlay); });
    let lastTap = 0;
    overlay.addEventListener('touchend', e => {
      if (!catEditMode) return;
      const now = Date.now();
      if (now - lastTap < 350) { e.preventDefault(); openCatRename(ci, overlay); }
      lastTap = now;
    });
    card.appendChild(overlay);

    if (cat.collapsed && focusCol === null) {
      card.style.position = 'relative';
      card.style.minHeight = '44px';
      card.style.cursor = 'pointer';
      const chevron = document.createElement('div');
      chevron.style.cssText = 'position:absolute;inset:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:32px;color:#636366;pointer-events:none;line-height:1;padding-top:4px;';
      chevron.textContent = '⌄';
      card.appendChild(chevron);
      card.addEventListener('click', () => toggleCollapse(ci));
      card.addEventListener('touchend', e => { e.preventDefault(); toggleCollapse(ci); });
      wrapper.appendChild(tab); wrapper.appendChild(card);
      if (selectedCats.has(ci)) { wrapper.classList.add('cat-selected'); tab.style.background = 'rgba(255,59,48,0.22)'; card.style.background = 'rgba(255,59,48,0.15)'; }
      board.appendChild(wrapper); return;
    }

    const colsEl = document.createElement('div');
    colsEl.className = 'cat-cols';

    [0, 1, 2].forEach(ki => {
      const colClass = ['regular', 'current', 'future'][ki];
      const col = document.createElement('div');
      col.className = `col ${colClass}`;
      col.dataset.ci = ci; col.dataset.ki = ki;

      (cat.cols[ki] || []).forEach((item, ii) => {
        const text = item.t;
        const flag = item.f || null;
        const chip = document.createElement('div');
        chip.className = 'chip';
        if (flag) chip.dataset.flag = flag;
        if (flag === 'focus') { chip.style.webkitBoxShadow = '0 0 0 2.5px rgba(255,255,255,0.6)'; chip.style.boxShadow = '0 0 0 2.5px rgba(255,255,255,0.6)'; }
        else if (flag === 'pause') { chip.style.background = '#28282a'; chip.style.color = '#6e6e73'; chip.style.border = '1.5px dashed #48484a'; }
        else if (flag === 'urgent') { chip.style.background = 'rgba(255,59,48,0.2)'; chip.style.color = '#ff3b30'; }
        if (flag && FLAG_ICON[flag]) { const iconEl = document.createElement('span'); iconEl.className = 'chip-flag'; iconEl.textContent = FLAG_ICON[flag]; chip.appendChild(iconEl); }
        const textEl = document.createElement('span');
        textEl.className = 'chip-text';
        textEl.textContent = text;
        chip.appendChild(textEl);
        chip.dataset.ci = ci; chip.dataset.ki = ki; chip.dataset.ii = ii;
        if (selectMode && item._key && selected.includes(item._key)) chip.classList.add('selected');

        let isDragging = false;
        let pressStartX = 0, pressStartY = 0;
        let pickerWasOpen = false;
        chip.addEventListener('mousedown', e => {
          if (e.button !== 0) return;
          e.preventDefault();
          pickerWasOpen = !!(activePicker && activePicker._chip === chip);
          isDragging = false;
          pressStartX = e.clientX; pressStartY = e.clientY;
          clearTimeout(longPressTimer);
          if (focusCol !== null) return;
          longPressTimer = setTimeout(() => { isDragging = true; startDrag(ci, ki, ii, chip, text, e.clientX, e.clientY); }, LONG_MS);
        });
        chip.addEventListener('mousemove', e => { if (Math.abs(e.clientX - pressStartX) > 6 || Math.abs(e.clientY - pressStartY) > 6) clearTimeout(longPressTimer); });
        let pendingPicker = null;
        chip.addEventListener('mouseup', () => {
          clearTimeout(longPressTimer);
          if (drag) { const over = document.querySelector('.col.drag-over'); if (over) endDrag(parseInt(over.dataset.ci), parseInt(over.dataset.ki)); else cancelDrag(); return; }
          if (isDragging) { isDragging = false; return; }
          isDragging = false;
          clearTimeout(pendingPicker);
          if (pickerWasOpen) { closeFlagPicker(); } else {
            pendingPicker = setTimeout(() => {
              const _ci = parseInt(chip.dataset.ci), _ki = parseInt(chip.dataset.ki), _ii = parseInt(chip.dataset.ii);
              openFlagPicker(chip, _ci, _ki, _ii, data[_ci].cols[_ki][_ii]?.f || null, data[_ci].cols[_ki][_ii]?.t || '');
            }, 0);
          }
        });
        chip.addEventListener('dblclick', e => { e.stopPropagation(); clearTimeout(pendingPicker); closeFlagPicker(); openChipEdit(chip, ci, ki, ii); });
        chip.addEventListener('touchstart', e => {
          isDragging = false;
          const t = e.touches[0];
          pressStartX = t.clientX; pressStartY = t.clientY;
          clearTimeout(longPressTimer);
          if (focusCol !== null) return;
          longPressTimer = setTimeout(() => { isDragging = true; startDrag(ci, ki, ii, chip, text, t.clientX, t.clientY); }, LONG_MS);
        }, { passive: true });
        chip.addEventListener('touchmove', e => {
          const t = e.touches[0];
          const dx = Math.abs(t.clientX - pressStartX), dy = Math.abs(t.clientY - pressStartY);
          if (dx > 6 || dy > 6) clearTimeout(longPressTimer);
          if (!drag) return;
          e.preventDefault();
          moveGhost(t.clientX, t.clientY);
          clearDragOver();
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const over = el && el.closest('.col');
          if (over && parseInt(over.dataset.ci) === drag.ci) over.classList.add('drag-over');
        }, { passive: false });
        chip.addEventListener('touchend', e => {
          clearTimeout(longPressTimer);
          if (drag) { const over = document.querySelector('.col.drag-over'); if (over) endDrag(parseInt(over.dataset.ci), parseInt(over.dataset.ki)); else cancelDrag(); return; }
          if (selectMode) { e.preventDefault(); toggleChipSelect(parseInt(chip.dataset.ci), parseInt(chip.dataset.ki), parseInt(chip.dataset.ii)); return; }
          const t = e.changedTouches[0];
          const dy = Math.abs(t.clientY - pressStartY);
          if (!isDragging && dy < 8) {
            const _ci = parseInt(chip.dataset.ci), _ki = parseInt(chip.dataset.ki), _ii = parseInt(chip.dataset.ii);
            openFlagPicker(chip, _ci, _ki, _ii, data[_ci].cols[_ki][_ii]?.f || null, data[_ci].cols[_ki][_ii]?.t || '');
          }
          isDragging = false;
        });
        chip.addEventListener('touchcancel', () => { clearTimeout(longPressTimer); cancelDrag(); });
        col.appendChild(chip);
      });

      if (focusCol === null) {
        const addRow = document.createElement('div');
        addRow.className = 'add-row';
        const addInp = document.createElement('input');
        addInp.dataset.ci = ci; addInp.dataset.ki = ki;
        addInp.className = 'add-inp';
        addInp.placeholder = '+';
        const doneBtn = document.createElement('button');
        doneBtn.className = 'add-done-btn';
        doneBtn.textContent = 'סיום';
        doneBtn.addEventListener('mousedown', e => e.preventDefault());
        doneBtn.addEventListener('click', () => submitAdd(addInp, ci, ki));
        addInp.addEventListener('paste', e => {
          e.preventDefault();
          const txt = (e.clipboardData || window.clipboardData).getData('text');
          const lines = txt.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
          if (lines.length <= 1) { addInp.value = txt.trim(); return; }
          lines.forEach(l => data[ci].cols[ki].push({ t: l, f: null }));
          commit(`${lines.length} הרגלים נוספו`);
        });
        addInp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitAdd(addInp, ci, ki); } });
        addInp.addEventListener('blur', () => submitAdd(addInp, ci, ki));
        addRow.appendChild(addInp); addRow.appendChild(doneBtn);
        col.appendChild(addRow);
      }
      colsEl.appendChild(col);
    });

    card.appendChild(colsEl);
    wrapper.appendChild(tab);
    wrapper.appendChild(card);
    if (selectedCats.has(ci)) { wrapper.classList.add('cat-selected'); tab.style.background = 'rgba(255,59,48,0.22)'; card.style.background = 'rgba(255,59,48,0.15)'; }
    board.appendChild(wrapper);
  });
}

function submitAdd(inp, ci, ki) {
  const val = inp.value.trim();
  if (!val) return;
  data[ci].cols[ki].push({ t: val, f: null, _key: newKey() });
  commit('הרגל נוסף');
  inp.value = '';
  setTimeout(() => { const inp2 = document.querySelector(`.add-inp[data-ci="${ci}"][data-ki="${ki}"]`); if (inp2) inp2.focus(); }, 30);
}

    ta.select();

      document.execCommand('copy');

let _confirmPickerPos = { top: 0, chipCx: 0 };

function showCatDeleteConfirm(ci, tabEl) {
  document.getElementById('catDeletePicker')?.remove();
  const rect = tabEl.getBoundingClientRect();
  const picker = document.createElement('div');
  picker.className = 'flag-picker delete-confirm-picker';
  picker.id = 'catDeletePicker';
  picker.innerHTML = `<button class="fp-btn fp-danger dp-ok"><span class="dp-delete-label">מחק קטגוריה</span></button>`;
  picker.style.top = '-9999px'; picker.style.left = '-9999px';
  document.body.appendChild(picker);
  const pw = picker.offsetWidth, ph = picker.offsetHeight;
  let left = rect.left - pw - 6;
  let top = rect.top + rect.height / 2 - ph / 2;
  if (left < 8) left = rect.right + 6;
  top = Math.max(8, Math.min(top, window.innerHeight - ph - 8));
  picker.style.top = top + 'px'; picker.style.left = left + 'px';
  const onOutside = e => { if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('pointerdown', onOutside, true); } };
  setTimeout(() => document.addEventListener('pointerdown', onOutside, true), 50);
  const doDelete = () => { picker.remove(); document.removeEventListener('pointerdown', onOutside, true); data.splice(ci, 1); commit('קטגוריה נמחקה'); };
  picker.querySelector('.dp-ok').addEventListener('click', doDelete);
  picker.querySelector('.dp-ok').addEventListener('touchend', e => { e.preventDefault(); doDelete(); });
}

let focusCol = null;
function setFocusCol(ki) {
  const items = document.querySelectorAll('.col-legend-item');
  if (focusCol === ki) {
    focusCol = null;
    document.body.classList.remove('focus-mode', 'focus-0', 'focus-1', 'focus-2');
    items.forEach(el => el.classList.remove('active-focus', 'dimmed'));
  } else {
    focusCol = ki;
    document.body.classList.remove('focus-0', 'focus-1', 'focus-2');
    document.body.classList.add('focus-mode', `focus-${ki}`);
    items.forEach((el, i) => { el.classList.toggle('active-focus', i === ki); el.classList.toggle('dimmed', i !== ki); });
  }
  render();
}

let selectMode = false;
let selected = [];

document.querySelectorAll('.col-legend-item').forEach((el, i) => {
  el.addEventListener('click', () => setFocusCol(i));
});

render();

function toggleSelectMode() {
  if (catEditMode) return;
  selectMode = !selectMode;
  selected = [];
  document.getElementById('selectBtn').classList.toggle('select-active', selectMode);
  document.body.classList.toggle('select-mode', selectMode);
  hideMoveRow();
  document.getElementById('bulk-bar').classList.toggle('show', selectMode);
  document.getElementById('bulk-done').style.display = 'none';
  updateBulkBar();
  render();
}

function exitSelectMode() {
  selectMode = false;
  selected = [];
  document.getElementById('selectBtn').classList.remove('select-active');
  document.body.classList.remove('select-mode');
  hideMoveRow();
  document.getElementById('bulk-bar').classList.remove('show');
  render();
}

function findItem(key) {
  for (let ci = 0; ci < data.length; ci++)
    for (let ki = 0; ki < 3; ki++)
      for (let ii = 0; ii < data[ci].cols[ki].length; ii++)
        if (data[ci].cols[ki][ii]._key === key) return {ci, ki, ii};
  return null;
}

function toggleChipSelect(ci, ki, ii) {
  const key = data[ci].cols[ki][ii]._key;
  const idx = selected.indexOf(key);
  if (idx >= 0) selected.splice(idx, 1);
  else selected.push(key);
  updateBulkBar();
  render();
}

function updateBulkBar() {
  document.getElementById('bulk-count').textContent = selected.length + ' נבחרו';
}

function bulkAction(action) {
  if (selected.length === 0) return;
  const resolved = selected.map(k => findItem(k)).filter(Boolean);
  if (action === 'delete') {
    const sorted = resolved.sort((a,b) => b.ci-a.ci || b.ki-a.ki || b.ii-a.ii);
    sorted.forEach(({ci,ki,ii}) => data[ci].cols[ki].splice(ii,1));
    commit(resolved.length + ' הרגלים נמחקו');
    exitSelectMode(); return;
  }
  if (action === 'focus') { resolved.forEach(({ci,ki,ii}) => { data[ci].cols[ki][ii].f = 'focus'; }); commit('סומנו כמודגשים'); }
  if (action === 'pause') { resolved.forEach(({ci,ki,ii}) => { data[ci].cols[ki][ii].f = 'pause'; }); commit('הושהו'); }
  document.getElementById('bulk-done').style.display = 'block';
  persist(); render(); updateBulkBar();
}

function showMoveRow() { document.getElementById('bulk-move-row').classList.add('show'); }
function hideMoveRow() { document.getElementById('bulk-move-row').classList.remove('show'); }

function bulkMove(targetKi) {
  if (selected.length === 0) return;
  const resolved = selected.map(k => findItem(k)).filter(Boolean);
  const sorted = resolved.sort((a,b) => b.ci-a.ci || b.ki-a.ki || b.ii-a.ii);
  sorted.forEach(({ci,ki,ii}) => { const item = data[ci].cols[ki].splice(ii,1)[0]; data[ci].cols[targetKi].push(item); });
  commit('הרגלים הועברו');
  hideMoveRow();
  document.getElementById('bulk-done').style.display = 'block';
  persist(); render(); updateBulkBar();
}
